# CI matrix per docs/TESTPLAN.md:
#   go test -race ./...  (anywhere)          -> unit
#   -tags integration    (ffmpeg/ffprobe)    -> integration
#   -tags "v4l2 sdl"     build (Linux)       -> hw-build
#   arm64 cross build                        -> cross-arm64
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded runs on PRs; let pushes to main run to completion.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      # make test = go vet ./... + go test -race ./...
      - run: make test

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Install ffmpeg/ffprobe
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      # make test-integration = go vet ./... + go test -race -tags integration ./...
      - run: make test-integration

  # Compile check of the cgo adapters (internal/camera, internal/screen).
  # V4L2 kernel headers come from linux-libc-dev, preinstalled on the runner.
  # No tests here -- there is no camera or display on the runner.
  hw-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Install SDL2 headers
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libsdl2-image-dev
      - run: go vet -tags "v4l2 sdl" ./...
      - run: go build -tags "v4l2 sdl" ./...
      # Real display path (decode -> flip -> present) under SDL's headless
      # dummy video driver -- no display needed.
      - run: SDL_VIDEODRIVER=dummy go test -tags sdl ./internal/screen/

  # Guard: deploy/poster/zeitspiegel-poster.svg (print master) and
  # site/poster.svg (embedded by site/guests.html) must stay in sync.
  # make-poster.py writes both; this job re-runs it and fails on drift.
  poster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install segno
      - run: make poster-check PYTHON=python3

  # Pure-Go arm64 binary (headless-capable, --source synth). The full
  # v4l2+sdl Pi binary needs cgo against Pi libs and is built on-device
  # with `make build-pi` -- see docs/ARCHITECTURE.md §5.
  cross-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build ./cmd/zeitspiegel
